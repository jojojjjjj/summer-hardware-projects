# 腾讯云广州主机自动部署 —— push 到 master 时自动构建并 rsync 同步到 duowei-summer.cn
# Auto-deploy to Tencent Cloud (Guangzhou) host on push to master.
# 凭证来自 GitHub Secrets (TENCENT_SSH_KEY / TENCENT_HOST / TENCENT_USER),公开仓库不可见。
# 构建用 DEPLOY_TARGET=cf (根路径 baseURL, 与 duowei-summer.cn 根路径匹配)。
name: Deploy to Tencent Host

on:
  push:
    branches: [master]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-tencent.yml'
  workflow_dispatch:

concurrency:
  group: tencent-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install & build
        run: |
          cd website
          npm ci
          DEPLOY_TARGET=cf npm run generate

      - name: Deploy to Tencent host (rsync over SSH)
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.TENCENT_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.TENCENT_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            website/.output/public/ \
            ${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}:/var/www/duowei-summer/
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }} \
            "nginx -t && systemctl reload nginx"
