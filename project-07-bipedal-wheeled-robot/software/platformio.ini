; ============================================================================
; 轮足机器人 | Bipedal Wheeled Robot
; PlatformIO 配置文件 | PlatformIO Configuration File
; ============================================================================
; 本文件定义了构建轮足机器人固件所需的所有依赖和构建选项
; This file defines all dependencies and build options for the robot firmware
; ============================================================================

; --- 基础环境配置 | Base Environment Configuration ---
[env:esp32dev]
; 使用 ESP32 开发板 | Use ESP32 development board
platform = espressif32

; 目标板型：ESP32 DevKit V1 | Target board: ESP32 DevKit V1
board = esp32dev

; 使用 Arduino 框架（最适合初学者）| Arduino framework (best for beginners)
framework = arduino

; --- 串口监视器设置 | Serial Monitor Settings ---
; 监视器波特率，与 Serial.begin() 保持一致
; Monitor baud rate, must match Serial.begin()
monitor_speed = 115200

; --- 编译优化选项 | Compilation Optimization ---
; -O2 优化：兼顾速度和代码大小 | -O2 optimization: balance speed and code size
build_flags =
    -O2

; --- 库依赖 | Library Dependencies ---
; 所有项目所需的第三方库 | All third-party libraries required by the project
lib_deps =
    ; MPU6050 六轴 IMU 传感器库 | MPU6050 6-axis IMU sensor library
    ; 提供加速度计和陀螺仪数据读取 | Provides accelerometer and gyroscope data reading
    ElectronicCats/MPU6050 @ ^0.6.0

    ; SimpleFOC - 无刷电机 FOC 矢量控制库 | SimpleFOC - BLDC motor FOC control library
    ; 支持磁场定向控制，实现平滑精确的电机驱动
    ; Supports field-oriented control for smooth and precise motor driving
    askuric/Simple FOC @ ^2.2.3

    ; ESP32Encoder - 编码器读取库 | ESP32 Encoder reading library
    ; 利用 ESP32 的 PCNT 外设硬件计数编码器脉冲
    ; Uses ESP32 PCNT peripheral for hardware encoder pulse counting
    madhephaestus/ESP32Encoder @ ^0.11.0

; --- 分区表 | Partition Table ---
; 使用默认分区，如需 OTA 可切换为 "huge_app.csv"
; Default partition; switch to "huge_app.csv" for OTA support
; board_build.partitions = default.csv

; --- 上传速度 | Upload Speed ---
; 921600 baud 可加快上传速度 | 921600 baud for faster upload
upload_speed = 921600
